<style>

/* =========================
   RESET
========================= */
html,
body{
margin:0;
padding:0;
width:100%;
min-height:100vh;
overflow-x:hidden;
font-family:'Poppins',sans-serif;
background:#000;
}

/* =========================
   WORLD CUP GOLD BACKGROUND
========================= */
.worldcup-gold{
position:relative;
min-height:100vh;

background:
radial-gradient(
circle at top,
rgba(255,215,0,.10),
transparent 30%
),

linear-gradient(
180deg,
#241800 0%,
#120d00 25%,
#070707 60%,
#000000 100%
);
}

/* =========================
   GOLD PARTICLES ULTRA LITE
========================= */
.gold-stars{
position:fixed;
inset:0;
pointer-events:none;
z-index:1;
opacity:.15;
}

.gold-stars:before{
content:'';
position:absolute;
inset:0;

background-image:
radial-gradient(
circle,
#ffd700 1px,
transparent 1.5px
);

background-size:120px 120px;

animation:goldFloat 80s linear infinite;
}

@keyframes goldFloat{
from{
transform:translateY(0);
}
to{
transform:translateY(-120px);
}
}

/* =========================
   GOLD SHINE
========================= */
.gold-shine{
position:fixed;
top:0;
left:-30%;
width:30%;
height:100%;
pointer-events:none;
z-index:2;

background:
linear-gradient(
90deg,
transparent,
rgba(255,215,0,.03),
transparent
);

animation:goldSweep 25s linear infinite;
}

@keyframes goldSweep{
100%{
left:130%;
}
}

/* =========================
   HEADER
========================= */
.world-cup-title{
position:relative;
z-index:10;
text-align:center;
padding:20px 15px;
}

/* =========================
   BIG LOGO CLICKABLE
========================= */
.logo-link{
display:block;
text-decoration:none;
}

.wc-logo{
display:block;
margin:0 auto 20px;

width:420px;
max-width:92%;
height:auto;

object-fit:contain;

filter:
drop-shadow(0 0 6px rgba(255,215,0,.5));

transition:.3s ease;
cursor:pointer;
}

.wc-logo:hover{
transform:scale(1.02);
}

.wc-logo:active{
transform:scale(.98);
}

.wc-card{
  background:
  radial-gradient(circle at top,rgba(255,215,0,.08),transparent 45%),
  linear-gradient(180deg,#08152e,#09111f);
  border:2px solid #FFD700;
  border-radius:18px;
  padding:18px;
  margin:15px 0;
  color:#fff;
  box-shadow:
  0 0 12px rgba(255,215,0,.30),
  0 0 25px rgba(255,215,0,.10);
  }

.wc-title{
text-align:center;
font-size:18px;
font-weight:800;
color:#FFD700;
margin-bottom:15px;
}

.wc-match{
display:flex;
justify-content:space-between;
align-items:center;
}

.wc-team{
width:40%;
text-align:center;
font-weight:700;
}

.wc-team img{
width:65px;
}

.wc-vs{
width:20%;
text-align:center;
}

.wc-vs span{
display:block;
font-size:30px;
font-weight:900;
color:#FFD700;
}

.wc-date{
font-size:12px;
color:#FFD700;
}

.wc-line{
height:1px;
margin:15px 0;
background:linear-gradient(90deg,transparent,#FFD700,transparent);
}

.wc-pred{
text-align:center;
line-height:1.8;
}

.wc-pred b{
color:#FFD700;
}
/* =========================
   TITLE
========================= */
.world-cup-title h1{
margin:0;

font-size:42px;
font-weight:900;
letter-spacing:3px;

background:
linear-gradient(
180deg,
#fff8d6,
#ffd700,
#ffb400
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 8px rgba(255,215,0,.5);

========================= */
body::after{
content:'';
position:fixed;

border:1px solid rgba(255,215,0,.15);

pointer-events:none;

0 0 8px rgba(255,215,0,.05);

/* =========================

<div class="reel" id="reel">
Rp ?
</div>

 AMBIL SALDOMU SEKARANG
</button>

</div>


<div class="popup" id="popup">

<div class="popup-card">

<div class="win-title" id="winType">
SALDO VOUCHER
</div>

<div class="win-amount" id="popupAmount">
Rp 0
</div>

<p id="popupUser"></p>

<br>

<a href="https://panahkawan.com"
target="_blank"
class="claim-btn">
🎁 CLAIM HADIAH
</a>
<br>

<button class="close-btn" onclick="closePopup()">
Tutup
</button>

</div>

</div>

<script>

const hadiah=[
{nominal:1000000,label:"VOUCHER"},
{nominal:1500000,label:"VOUCHER"},
{nominal:1750000,label:"VOUCHER"},
{nominal:2000000,label:"VOUCHER"}
];

function spinSlot(){

let user =
document.getElementById("username").value;

if(user==""){
alert("Masukkan Username terlebih dahulu!");
return;
}

const reel=document.getElementById("reel");

let count=0;

let rolling=setInterval(()=>{

reel.innerHTML=
"Rp "+
(Math.floor(Math.random()*9)+1)+
"."+
(Math.floor(Math.random()*999))+
".000";

count++;

if(count>30){

clearInterval(rolling);

let result=
hadiah[Math.floor(Math.random()*hadiah.length)];

reel.innerHTML=
"Rp "+result.nominal.toLocaleString("id-ID");

document.getElementById("winType").innerHTML=
result.label;

document.getElementById("popupAmount").innerHTML=
"Rp "+result.nominal.toLocaleString("id-ID");


document.getElementById("popupUser").innerHTML=
"🎉 Selamat <b>"+user+
"</b><br>SCREENSHOT SALDO VOUCHER ANDA BERIKAN KE ADMIN SEKARANG JUGA.!!!";

document.getElementById("popup").style.display=
"flex";

confetti({
particleCount:400,
spread:180,
origin:{y:0.6}
});

}

},100);

}
function closePopup(){
    document.getElementById("popup").style.display = "none";
}
</script>
