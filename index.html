<script>

const winners = [

["PAN***88","2.000.000"],
["JOK***12","1.500.000"],
["BOS***99","1.750.000"],
["SUL***45","1.000.000"],
["AND***77","2.000.000"],
["VIP***11","1.500.000"],
["MAX***66","1.750.000"],
["PRO***09","2.000.000"],
["WIN***88","1.000.000"],
["TOP***21","1.500.000"],
["LUC***55","2.000.000"],
["DER***77","2.000.000"],
["4DE***00","2.000.000"],
["KIN***22","1.750.000"]

];

function renderWinners(){

let html = "";

const shuffled =
[...winners].sort(()=>0.5-Math.random());

const selected =
shuffled.slice(0,5);

selected.forEach(item=>{

html += `
<div class="winner-item">
<span>${item[0]}</span>
<span class="winner-amount">
Rp ${item[1]}
</span>
</div>
`;

});

document.getElementById("winnerFeed").innerHTML = html;

}

renderWinners();

setInterval(renderWinners,5000);

</script>
<script>

const hadiah=[
{nominal:1000000,label:"VOUCHER"},
{nominal:1500000,label:"VOUCHER"},
{nominal:1750000,label:"VOUCHER"},
{nominal:2000000,label:"VOUCHER"}
];

let isSpinning=false;

window.addEventListener("load",()=>{

if(localStorage.getItem("voucher_claimed")){

const btn=document.querySelector(".spin-btn");

btn.innerHTML="SUDAH CLAIM";
btn.disabled=true;
btn.style.opacity=".5";
btn.style.cursor="not-allowed";

}

});

function spinSlot(){

if(isSpinning) return;

if(localStorage.getItem("voucher_claimed")){
alert("❌ Voucher sudah pernah di-claim!");
return;
}

const user=document.getElementById("username").value;

if(user==""){
alert("Masukkan Username terlebih dahulu!");
return;
}

isSpinning=true;

const reel=document.getElementById("reel");
const btn=document.querySelector(".spin-btn");

btn.innerHTML="MEMPROSES...";
btn.disabled=true;

let speed=50;
let count=0;

function rollingEffect(){

reel.innerHTML=
"Rp "+
(Math.floor(Math.random()*9)+1)+
"."+
(Math.floor(Math.random()*900)+100)+
".000";

count++;

if(count<45){

if(count>25){
speed+=12;
}

setTimeout(rollingEffect,speed);

}else{

const result=
hadiah[Math.floor(Math.random()*hadiah.length)];

reel.innerHTML=
"Rp "+result.nominal.toLocaleString("id-ID");

document.getElementById("winType").innerHTML=
"🎉 SELAMAT 🎉";

document.getElementById("popupAmount").innerHTML=
"Rp "+result.nominal.toLocaleString("id-ID");

document.getElementById("popupUser").innerHTML=
"🎊 Selamat <b>"+user+
"</b><br><br>SCREENSHOT VOUCHER INI DAN KIRIM KE ADMIN UNTUK CLAIM HADIAH.";

document.getElementById("popup").style.display="flex";

localStorage.setItem("voucher_claimed","true");
    
btn.innerHTML="SUDAH CLAIM";
btn.disabled=true;
btn.style.opacity=".5";
btn.style.cursor="not-allowed";

isSpinning=false;

if(typeof confetti!=="undefined"){
confetti({
particleCount:400,
spread:180,
origin:{y:0.6}
});

setTimeout(()=>{
confetti({
particleCount:250,
spread:120,
origin:{x:0}
});
},300);

setTimeout(()=>{
confetti({
particleCount:250,
spread:120,
origin:{x:1}
});
},300);
}

}

}

rollingEffect();

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>
<script>
function fitReelText(){
    const reel = document.querySelector('.reel');

    let size = 150; /* Perbesar dari 50 menjadi 70 */

    reel.style.fontSize = size + 'px';

    while(reel.scrollWidth > reel.clientWidth - 20 && size > 30){
        size--;
        reel.style.fontSize = size + 'px';
    }
}

window.addEventListener('load', fitReelText);
window.addEventListener('resize', fitReelText);
</script>
