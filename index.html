body{

0 2px 0 #e6c200,

}

font-size:20px;

border-radius:50px;

linear-gradient(45deg,#FFD700,#FFA500);
box-shadow:0 0 20px gold;
}

.spin-btn:hover{

}

.popup{

left:0;

height:100%;

.close-btn{

border-radius:25px;

color:white;
cursor:pointer;
}

<body>

<div class="container">

<div class="title">VOUCHER PANAH4D</div>

<div class="subtitle">
Tekan tombol dan Claim Saldo voucher Mu.!!
</div>
<input
type="text"
id="username"
placeholder="MASUKKAN USERNAME / ID"
class="username-input">

<br><br>
<div class="slot-machine">

<div class="reel" id="reel">
Rp ?
</div>

<button class="spin-btn" onclick="spinSlot()">
 AMBIL SALDOMU SEKARANG
</button>

</div>

</div>

<div class="popup" id="popup">

<div class="popup-card">

<div class="win-title" id="winType">
SALDO VOUCHER
</div>

<div class="win-amount" id="popupAmount">
Rp 0
</div>

<p id="popupUser"></p>

<br>

<a href="https://panahkawan.com"
target="_blank"
class="claim-btn">
🎁 CLAIM HADIAH
</a>
<br>

<button class="close-btn" onclick="closePopup()">
Tutup
</button>

</div>

</div>

<script>

const hadiah=[
{nominal:1000000,label:"BIG WIN"},
{nominal:2000000,label:"MEGA WIN"},
{nominal:5000000,label:"SUPER JACKPOT"},
{nominal:10000000,label:"MAX WIN"}
];

function spinSlot(){

let user =
document.getElementById("username").value;

if(user==""){
alert("Masukkan Username terlebih dahulu!");
return;
}

const reel=document.getElementById("reel");

let count=0;

let rolling=setInterval(()=>{

reel.innerHTML=
"Rp "+
(Math.floor(Math.random()*9)+1)+
"."+
(Math.floor(Math.random()*999))+
".000";

count++;

if(count>30){

clearInterval(rolling);

let result=
hadiah[Math.floor(Math.random()*hadiah.length)];

reel.innerHTML=
"Rp "+result.nominal.toLocaleString("id-ID");

document.getElementById("winType").innerHTML=
result.label;

document.getElementById("popupAmount").innerHTML=
"Rp "+result.nominal.toLocaleString("id-ID");


document.getElementById("popupUser").innerHTML=
"🎉 Selamat <b>"+user+
"</b><br>Anda berhasil memenangkan hadiah!";

document.getElementById("popup").style.display=
"flex";

confetti({
particleCount:400,
spread:180,
origin:{y:0.6}
});

}

},100);

}
function closePopup(){
    document.getElementById("popup").style.display = "none";
}
</script>
