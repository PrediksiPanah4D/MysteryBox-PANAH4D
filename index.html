<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mystery Box 3D Premium</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(circle at center,#0c4fff,#000814);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.container{
text-align:center;
width:100%;
max-width:700px;
padding:20px;
}

.title{
font-size:60px;
font-weight:900;
text-transform:uppercase;
background:linear-gradient(45deg,#fff,#00d4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 25px #00bfff;
}

.subtitle{
font-size:22px;
margin-bottom:25px;
}

input{
width:100%;
max-width:400px;
padding:15px;
font-size:18px;
border-radius:15px;
border:none;
outline:none;
margin-bottom:30px;
text-align:center;
}

.box-wrap{
perspective:1000px;
margin:auto;
width:250px;
height:250px;
position:relative;
transform:translateY(80px);
}

button{
margin-top:120px;
padding:16px 40px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:50px;
cursor:pointer;
background:linear-gradient(45deg,#FFD700,#FFA500);
box-shadow:0 0 30px gold;
}
  
.box{
width:250px;
height:250px;
position:relative;
transform-style:preserve-3d;
animation:float 4s infinite ease-in-out;
}
input{
width:100%;
max-width:400px;
padding:15px;
font-size:18px;
border-radius:15px;
margin-bottom:50px;
}

.box-wrap{
perspective:1000px;
width:250px;
height:250px;
margin:0 auto;
transform:translateY(60px);
}

button{
margin-top:90px;
}
.face{
position:absolute;
width:250px;
height:180px;
background:linear-gradient(145deg,#0055ff,#001a66);
border:5px solid gold;
box-shadow:0 0 30px #00c3ff;
border-radius:20px;
}

.front{
display:flex;
justify-content:center;
align-items:center;
font-size:100px;
font-weight:bold;
transform:translateZ(30px);
}

.lid{
position:absolute;
width:250px;
height:70px;
background:linear-gradient(145deg,#0066ff,#002b99);
border:5px solid gold;
border-radius:15px;
top:-40px;
left:0;
transform-origin:bottom;
transition:1s;
box-shadow:0 0 30px gold;
}

.shake{
animation:shake .08s infinite;
}

.open .lid{
transform:rotateX(-150deg);
}

@keyframes shake{
0%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
100%{transform:translateX(-8px);}
}

@keyframes float{
50%{
transform:translateY(-15px) rotateY(15deg);
}
}

button{
margin-top:25px;
padding:16px 40px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:50px;
cursor:pointer;
background:
linear-gradient(45deg,#FFD700,#FFA500);
box-shadow:0 0 30px gold;
}

button:hover{
transform:scale(1.05);
}

#boom{
display:none;
font-size:100px;
margin-top:20px;
animation:boom .8s ease-out;
}

@keyframes boom{
from{
transform:scale(0);
opacity:0;
}
to{
transform:scale(1.5);
opacity:1;
}
}

.result{
display:none;
margin-top:25px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
box-shadow:0 0 25px #00d4ff;
}

.result h2{
font-size:40px;
color:#FFD700;
}

.result p{
font-size:22px;
margin-top:10px;
}

.coin{
position:absolute;
font-size:40px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}

.glow{
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,#00c3ff55,transparent);
border-radius:50%;
z-index:-1;
animation:pulse 3s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.3);
}
}

</style>
</head>
<body>

<div class="glow"></div>

<div class="container">

<h1 class="title">MYSTERY BOX</h1>

<p class="subtitle">
Masukkan Username / ID dan buka Mystery Box
</p>

<input
type="text"
id="username"
placeholder="Masukkan Username / ID">

<div class="box-wrap">
<div class="box" id="box">

<div class="lid"></div>

<div class="face front">
?
</div>

</div>
</div>
<script>
function openBox(){

// Cek apakah sudah pernah klaim
if(localStorage.getItem("mystery_claimed")){
    alert("❌ Anda sudah pernah mengklaim Mystery Box ini!");
    return;
}

let user =
document.getElementById("username").value;

if(user==""){
    alert("Masukkan Username / ID");
    return;
}

let box =
document.getElementById("box");

box.classList.add("shake");

setTimeout(()=>{

    box.classList.remove("shake");
    box.classList.add("open");

    document.getElementById("boom").style.display="block";

    document.getElementById("boomSound").play();

    launchConfetti();
    rainCoins();

    let saldo =
    hadiah[Math.floor(Math.random()*hadiah.length)];

    setTimeout(()=>{

        document.getElementById("result").style.display="block";

        document.getElementById("saldo").innerHTML =
        "Rp " + saldo.toLocaleString("id-ID");

        document.getElementById("ucapan").innerHTML =
        "🎉 Selamat <b>"+user+
        "</b><br>Anda mendapatkan hadiah saldo!";

        // Simpan status klaim
        localStorage.setItem("mystery_claimed","true");
        localStorage.setItem("claim_user",user);
        localStorage.setItem("claim_saldo",saldo);

    },1000);

},2500);

}
  window.onload = function(){

    if(localStorage.getItem("mystery_claimed")){

        document.querySelector("button").disabled = true;

        document.querySelector("button").innerHTML =
        "✅ SUDAH DIKLAIM";

        document.querySelector("button").style.opacity = ".6";

    }

}
</script>
<div id="boom">
💥 BOOM!
</div>

<div class="result" id="result">
<h2 id="saldo"></h2>
<p id="ucapan"></p>
</div>

</div>

<audio id="boomSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3">
</audio>

<script>

const hadiah=[
1000000,
1000000,
1000000,
1000000,
2000000
];
  
function openBox(){

let user=
document.getElementById("username").value;

if(user==""){
alert("Masukkan Username / ID");
return;
}

let box=
document.getElementById("box");

box.classList.add("shake");

setTimeout(()=>{

box.classList.remove("shake");

box.classList.add("open");

document
.getElementById("boom")
.style.display="block";

document
.getElementById("boomSound")
.play();

launchConfetti();

rainCoins();

let saldo=
hadiah[
Math.floor(
Math.random()*hadiah.length
)
];

setTimeout(()=>{

document
.getElementById("result")
.style.display="block";

document
.getElementById("saldo")
.innerHTML=
"Rp "+saldo.toLocaleString("id-ID");

document
.getElementById("ucapan")
.innerHTML=
"🎉 Selamat <b>"+user+
"</b><br>Anda mendapatkan hadiah saldo!";

},1000);

},2500);

}

function launchConfetti(){

confetti({
particleCount:300,
spread:180,
origin:{y:0.6}
});

}

function rainCoins(){

for(let i=0;i<40;i++){

let coin=
document.createElement("div");

coin.innerHTML="🪙";

coin.className="coin";

coin.style.left=
Math.random()*100+"%";

coin.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(coin);

setTimeout(()=>{
coin.remove();
},5000);

}

}

</script>

</body>
</html>
